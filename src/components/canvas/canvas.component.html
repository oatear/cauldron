<div class="w-full h-full relative flex flex-col bg-[#111418] overflow-hidden select-none">
    <!-- Scrollable Viewport -->
    <div 
      class="flex-1 overflow-hidden flex items-center justify-center outline-none cursor-grab" 
      [class.cursor-grabbing]="isPanning()"
      #scrollContainer
      (mousedown)="onBgMouseDown($event)"
      (mouseup)="onMouseUp()"
      (mousemove)="onMouseMove($event)"
      (mouseleave)="onMouseUp()"
      (wheel)="onWheel($event)"
      (dragover)="onDragOver($event)"
      (drop)="onDrop($event)"
    >
        <!-- Background Layer (Behind Card) -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <!-- Large Grid (Locked to Card coordinates) -->
            <div 
                class="absolute top-1/2 left-1/2 w-[10000px] h-[10000px] opacity-40"
                [style.transform]="'translate(calc(-50% + ' + pan().x + 'px), calc(-50% + ' + pan().y + 'px)) scale(' + zoom() + ')'"
            >
                <div class="absolute inset-0 grid-pattern"></div>
                <div class="absolute inset-0 grid-axes"></div>
            </div>
            
            <!-- Fixed Grid Fade (Centered on screen, behind card) -->
            <div class="absolute inset-0 grid-fade z-0"></div>
        </div>

        <!-- Card Layer (In front of background) -->
        <div 
           class="relative flex-shrink-0 z-10"
           [style.transform]="'translate(' + pan().x + 'px, ' + pan().y + 'px)'"
        >
            <!-- Sizing Wrapper (Fixed footprint to prevent layout shifts) -->
            <div 
               [style.width.px]="cardWidth()" 
               [style.height.px]="cardHeight()" 
               class="relative flex-shrink-0"
            >
                <!-- Content (Centered Scaling) -->
                <div 
                  class="absolute inset-0 origin-center shadow-2xl"
                  #cardContainer
                  [style.transform]="'scale(' + zoom() + ')'"
                >
                    <app-block-renderer 
                      [block]="store.rootBlock()" 
                      (mousedown)="onBlockMouseDown($event)"
                    ></app-block-renderer>
                    
                    <!-- Snap Guides for Dragging -->
                    @for (guide of guides(); track $index) {
                        <div 
                            class="absolute bg-[#7089a2] z-[100] pointer-events-none"
                            [style.left.px]="guide.type === 'vertical' ? guide.position - 1 : 0"
                            [style.top.px]="guide.type === 'horizontal' ? guide.position - 1 : 0"
                            [style.width]="guide.type === 'vertical' ? '2px' : '100%'"
                            [style.height]="guide.type === 'horizontal' ? '2px' : '100%'"
                        ></div>
                    }
                </div>
            </div>
        </div>
    </div>

    <!-- Zoom Controls -->
    <div class="absolute bottom-8 right-8 flex items-center gap-2 bg-[#262c35]/80 backdrop-blur-md p-2 rounded-[12px] shadow-2xl border border-[#434d5d] z-50">
        <button (click)="adjustZoom(-0.1)" class="w-8 h-8 flex items-center justify-center rounded-[8px] hover:bg-[#353d49] text-[#bbc1cb] hover:text-white transition-colors" title="Zoom Out">
            <i class="pi pi-minus"></i>
        </button>
        
        <button 
            (click)="toggleZoom()" 
            class="w-14 h-8 flex items-center justify-center rounded-[8px] hover:bg-[#353d49] text-xs font-mono font-bold text-[#bbc1cb] hover:text-white transition-colors select-none"
            title="Toggle Zoom (100% / Fit)"
        >
            {{ (zoom() * 100).toFixed(0) }}%
        </button>

        <button (click)="adjustZoom(0.1)" class="w-8 h-8 flex items-center justify-center rounded-[8px] hover:bg-[#353d49] text-[#bbc1cb] hover:text-white transition-colors" title="Zoom In">
            <i class="pi pi-plus"></i>
        </button>
        
        <div class="w-px h-4 bg-[#434d5d] mx-1"></div>

        <button (click)="resetPan()" class="w-8 h-8 flex items-center justify-center rounded-[8px] hover:bg-[#353d49] text-[#bbc1cb] hover:text-white transition-colors" title="Reset View">
            <i class="pi pi-refresh"></i>
        </button>
    </div>
</div>
