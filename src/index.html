<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Oatear Cauldron</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for better UI in panels */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #181c21;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border: 3px solid #181c21;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .checkboard {
      background-image:
        linear-gradient(45deg, #1f242b 25%, transparent 25%),
        linear-gradient(-45deg, #1f242b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1f242b 75%),
        linear-gradient(-45deg, transparent 75%, #1f242b 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
  </style>


</head>

<body class="bg-[#181c21] text-[#bbc1cb] h-screen overflow-hidden">
  <app-root></app-root>
  <script type="module" src="./main.ts"></script>
</body>

</html>
